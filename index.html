    }
  }

  else if (theme === 'bridge') {
    // Bridge over water
    drawSky('#a8d8ea', '#d0eaf5');
    drawSun(500, 60);
    // Distant city skyline
    ctx.fillStyle = '#6a7a8a99';
    for (let i = 0; i < 20; i++) {
      const bh = 80 + (i * 73) % 120;
      ctx.fillRect(i * (W / 20), GY - bh, W / 20 - 4, bh);
    }
    // Water
    drawWater();
    // Bridge road surface
    ctx.fillStyle = '#888';
    ctx.fillRect(0, GY, W, 30);
    // Bridge cable towers
    for (let tx = 600; tx < W; tx += 1200) {
      ctx.fillStyle = '#999';
      ctx.fillRect(tx - 15, GY - 300, 30, 300);
      ctx.fillRect(tx + 200 - 15, GY - 300, 30, 300);
      // Cables
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(tx, GY - 300); ctx.lineTo(tx + 100, GY); ctx.lineTo(tx + 200, GY - 300); ctx.stroke();
    }
    // Guard rails
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0, GY); ctx.lineTo(W, GY); ctx.stroke();
    ctx.strokeStyle = '#999'; ctx.lineWidth = 3;
    for (let px = 0; px < W; px += 60) {
      ctx.beginPath(); ctx.moveTo(px, GY); ctx.lineTo(px, GY - 40); ctx.stroke();
    }
  }

  else if (theme === 'industrial') {
    // Industrial facility
    drawSky('#3a3a4a', '#2a2a3a');
    drawStars(30);
    // Large factory building
    ctx.fillStyle = '#2c3040';
    ctx.fillRect(0, 0, W, GY);
    // Riveted panels
    ctx.strokeStyle = '#3a4050';
    ctx.lineWidth = 4;
    for (let x = 0; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GY); ctx.stroke(); }
    for (let y = 0; y < GY; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    // Rivets
    ctx.fillStyle = '#4a5060';
    for (let x = 40; x < W; x += 80) {
      for (let y = 40; y < GY; y += 80) {
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
      }
    }
    // Pipes overhead
    ctx.strokeStyle = '#778899'; ctx.lineWidth = 20;
    for (let px = 0; px < W; px += 300) {
      ctx.beginPath(); ctx.moveTo(px, 30); ctx.lineTo(px + 250, 30); ctx.stroke();
    }
    // Glowing vents
    for (let vx = 200; vx < W; vx += 400) {
      ctx.fillStyle = '#ff4400aa';
      ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 20;
      ctx.fillRect(vx, GY - 80, 60, 40);
      ctx.shadowBlur = 0;
    }
    drawConcrete('#252525', '#303030');
  }

  else if (theme === 'dockyard') {
    // Harbor / dockyard
    drawSky('#1e3a5f', '#2a5080');
    drawMoon(W - 300, 80, 50);
    drawStars(60);
    drawWater();
    // Dock planks
    ctx.fillStyle = '#5c4a30';
    ctx.fillRect(0, GY, W, 40);
    ctx.strokeStyle = '#3d3020'; ctx.lineWidth = 2;
    for (let dx = 0; dx < W; dx += 25) {
      ctx.beginPath(); ctx.moveTo(dx, GY); ctx.lineTo(dx, GY + 40); ctx.stroke();
    }
    // Cranes (background)
    ctx.fillStyle = '#4a5a6a';
    for (let cx = 400; cx < W; cx += 800) {
      ctx.fillRect(cx, GY - 300, 20, 300);
      ctx.fillRect(cx, GY - 300, 200, 20);
      // Crane cable
      ctx.strokeStyle = '#8899aa'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx + 200, GY - 290); ctx.lineTo(cx + 150, GY - 50); ctx.stroke();
    }
    // Warehouse walls in background
    ctx.fillStyle = '#2a3545';
    for (let wx = 0; wx < W; wx += 300) {
      ctx.fillRect(wx, GY - 200, 280, 200);
    }
    // Harbor lights
    for (let lx = 100; lx < W; lx += 200) {
      ctx.fillStyle = '#ffcc5588';
      ctx.shadowColor = '#ffcc55'; ctx.shadowBlur = 15;
      ctx.beginPath(); ctx.arc(lx, GY - 10, 8, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  else if (theme === 'subway') {
    // Underground subway
    ctx.fillStyle = '#111118';
    ctx.fillRect(0, 0, W, H);
    // Tiled walls
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(0, GY - 300, W, 300);
    ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 1;
    for (let tx = 0; tx < W; tx += 40) {
      ctx.beginPath(); ctx.moveTo(tx, GY - 300); ctx.lineTo(tx, GY); ctx.stroke();
    }
    for (let ty = GY - 300; ty < GY; ty += 40) {
      ctx.beginPath(); ctx.moveTo(0, ty); ctx.lineTo(W, ty); ctx.stroke();
    }
    // Colored stripe
    ctx.fillStyle = '#e63946';
    ctx.fillRect(0, GY - 120, W, 20);
    ctx.fillStyle = '#2196f3';
    ctx.fillRect(0, GY - 100, W, 10);
    // Platform
    ctx.fillStyle = '#888888';
    ctx.fillRect(0, GY, W, 40);
    // Platform edge stripe
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(0, GY, W, 8);
    // Overhead lights
    for (let lx = 150; lx < W; lx += 300) {
      ctx.fillStyle = '#ffffee';
      ctx.shadowColor = '#ffffcc'; ctx.shadowBlur = 30;
      ctx.fillRect(lx - 40, 20, 80, 15);
      ctx.shadowBlur = 0;
    }
    // Rail tracks (visible at ground level)
    ctx.fillStyle = '#333';
    ctx.fillRect(0, GY + 40, W, 30);
    ctx.fillStyle = '#777';
    ctx.fillRect(0, GY + 43, W, 5);
    ctx.fillRect(0, GY + 55, W, 5);
  }

  else if (theme === 'mall') {
    // Indoor shopping mall
    drawSky('#e8e0d0', '#d4ccc0');
    // Ceiling
    ctx.fillStyle = '#f0ece0';
    ctx.fillRect(0, 0, W, GY);
    // Skylight panels
    for (let slx = 100; slx < W; slx += 400) {
      ctx.fillStyle = '#d0eaf860';
      ctx.fillRect(slx, 10, 280, 60);
      ctx.strokeStyle = '#c0d0e0'; ctx.lineWidth = 2;
      ctx.strokeRect(slx, 10, 280, 60);
      // Light shafts
      ctx.fillStyle = 'rgba(200,230,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(slx, 70); ctx.lineTo(slx + 280, 70);
      ctx.lineTo(slx + 320, GY); ctx.lineTo(slx - 40, GY);
      ctx.closePath(); ctx.fill();
    }
    // Shop fronts (background)
    for (let sfx = 0; sfx < W; sfx += 200) {
      const shopColors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6'];
      ctx.fillStyle = shopColors[(sfx / 200) % shopColors.length] + '88';
      ctx.fillRect(sfx, GY - 200, 180, 200);
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
      ctx.strokeRect(sfx, GY - 200, 180, 200);
      // Shop window
      ctx.fillStyle = '#aacce888';
      ctx.fillRect(sfx + 20, GY - 180, 140, 100);
    }
    // Marble floor
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(0, GY, W, H - GY + 200);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2;
    for (let i = 0; i < W; i += 100) { ctx.beginPath(); ctx.moveTo(i, GY); ctx.lineTo(i, H); ctx.stroke(); }
    for (let j = GY; j < H; j += 100) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(W, j); ctx.stroke(); }
  }

  else if (theme === 'office') {
    // Multi-floor office building interior
    drawBuildingFacade('#2c3e50', '#3a4f62', '#1e2b38');
    drawConcrete('#3a3a3a', '#444');
  }

  else if (theme === 'construction') {
    // Construction site
    drawSky('#e8a84a', '#f5c870');
    drawSun(200, 90);
    // Dirt/mud ground
    ctx.fillStyle = '#7a5a30';
    ctx.fillRect(0, GY, W, H - GY + 200);
    // Scaffold structures
    ctx.strokeStyle = '#888'; ctx.lineWidth = 5;
    for (let sx = 200; sx < W; sx += 400) {
      // Vertical poles
      ctx.beginPath(); ctx.moveTo(sx, GY); ctx.lineTo(sx, GY - 250); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx + 120, GY); ctx.lineTo(sx + 120, GY - 250); ctx.stroke();
      // Horizontal bars
      for (let hy = GY - 60; hy > GY - 250; hy -= 60) {
        ctx.beginPath(); ctx.moveTo(sx, hy); ctx.lineTo(sx + 120, hy); ctx.stroke();
      }
      // Diagonal braces
      ctx.strokeStyle = '#777'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(sx, GY - 60); ctx.lineTo(sx + 120, GY - 120); ctx.stroke();
      ctx.strokeStyle = '#888'; ctx.lineWidth = 5;
    }
    // Concrete mixer
    ctx.fillStyle = '#999';
    ctx.beginPath(); ctx.arc(W / 2, GY - 60, 40, 0, Math.PI * 2); ctx.fill();
    // Warning tape
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 8; ctx.setLineDash([30, 15]);
    ctx.beginPath(); ctx.moveTo(0, GY + 5); ctx.lineTo(W, GY + 5); ctx.stroke();
    ctx.setLineDash([]);
  }

  else if (theme === 'airfield') {
    // Airfield / tarmac
    drawSky('#6ab4d8', '#a8d4ee');
    drawSun(W - 300, 70);
    // Tarmac
    ctx.fillStyle = '#363636';
    ctx.fillRect(0, GY, W, H - GY + 200);
    // Runway markings
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 6; ctx.setLineDash([80, 40]);
    ctx.beginPath(); ctx.moveTo(0, GY + 20); ctx.lineTo(W, GY + 20); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 4; ctx.setLineDash([40, 20]);
    ctx.beginPath(); ctx.moveTo(0, GY + 40); ctx.lineTo(W, GY + 40); ctx.stroke();
    ctx.setLineDash([]);
    // Hangars in background
    for (let hx = 0; hx < W; hx += 500) {
      ctx.fillStyle = '#888';
      ctx.fillRect(hx, GY - 180, 460, 180);
      // Hangar arch
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.ellipse(hx + 230, GY - 180, 230, 80, 0, Math.PI, 0);
      ctx.fill();
    }
    // Control tower
    ctx.fillStyle = '#aaa';
    ctx.fillRect(W / 2 - 30, GY - 320, 60, 320);
    ctx.fillStyle = '#cce8ff';
    ctx.fillRect(W / 2 - 50, GY - 360, 100, 50);
  }

  else if (theme === 'powerplant') {
    // Power plant
    drawSky('#1a1a2a', '#2a2a3a');
    drawStars(40);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, W, GY);
    // Cooling towers
    for (let ctx2x = 100; ctx2x < W; ctx2x += 600) {
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.moveTo(ctx2x, GY);
      ctx.quadraticCurveTo(ctx2x - 40, GY - 150, ctx2x + 60, GY - 300);
      ctx.lineTo(ctx2x + 140, GY - 300);
      ctx.quadraticCurveTo(ctx2x + 240, GY - 150, ctx2x + 200, GY);
      ctx.closePath();
      ctx.fill();
      // Steam
      for (let si = 0; si < 3; si++) {
        ctx.fillStyle = 'rgba(200,200,220,0.15)';
        ctx.beginPath();
        ctx.ellipse(ctx2x + 100 + si * 10, GY - 310 - si * 20, 30 + si * 15, 15 + si * 10, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Electrical pylons
    ctx.strokeStyle = '#558877'; ctx.lineWidth = 4;
    for (let px = 300; px < W; px += 400) {
      ctx.beginPath(); ctx.moveTo(px, GY - 200); ctx.lineTo(px, GY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px - 40, GY - 150); ctx.lineTo(px + 40, GY - 150); ctx.stroke();
      // wires
      ctx.strokeStyle = '#33aa77'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(px + 40, GY - 150); ctx.lineTo(px + 440, GY - 150); ctx.stroke();
      ctx.strokeStyle = '#558877'; ctx.lineWidth = 4;
    }
    drawConcrete('#202020', '#2a2a2a');
    // Hazard floor stripes
    ctx.fillStyle = '#ffcc0044';
    for (let i = 0; i < W; i += 80) {
      ctx.fillRect(i, GY, 40, 30);
    }
  }

  else if (theme === 'prison') {
    // Prison interior
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(0, 0, W, H);
    // Concrete wall blocks
    ctx.fillStyle = '#555';
    ctx.fillRect(0, 0, W, GY);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 3;
    for (let r = 0; r < GY; r += 40) {
      const off = (Math.floor(r / 40) % 2) * 40;
      for (let c = off; c < W; c += 80) {
        ctx.strokeRect(c, r, 78, 38);
      }
    }
    // Cell bars
    ctx.strokeStyle = '#888'; ctx.lineWidth = 6;
    for (let bx = 200; bx < W; bx += 150) {
      for (let by = GY - 180; by < GY; by += 30) {
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by + 25); ctx.stroke();
      }
    }
    // Fluorescent overhead lights
    for (let lx = 150; lx < W; lx += 350) {
      ctx.fillStyle = '#eeeeff';
      ctx.shadowColor = '#aaaaff'; ctx.shadowBlur = 20;
      ctx.fillRect(lx - 40, 15, 80, 12);
      ctx.shadowBlur = 0;
    }
    drawConcrete('#3a3a3a', '#444');
  }

  else if (theme === 'hospital') {
    // Hospital interior
    ctx.fillStyle = '#e8f0f4';
    ctx.fillRect(0, 0, W, H);
    // White/green walls
    ctx.fillStyle = '#f4f8f4';
    ctx.fillRect(0, 0, W, GY);
    // Wainscoting
    ctx.fillStyle = '#c8dcc8';
    ctx.fillRect(0, GY - 80, W, 80);
    // Grid ceiling
    ctx.strokeStyle = '#dde6dd'; ctx.lineWidth = 2;
    for (let cx2 = 0; cx2 < W; cx2 += 120) { ctx.beginPath(); ctx.moveTo(cx2, 0); ctx.lineTo(cx2, GY - 80); ctx.stroke(); }
    for (let cy = 0; cy < GY - 80; cy += 120) { ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke(); }
    // Ceiling lights
    for (let lx = 100; lx < W; lx += 240) {
      ctx.fillStyle = '#fffef0';
      ctx.shadowColor = '#ffffcc'; ctx.shadowBlur = 20;
      ctx.fillRect(lx - 30, 20, 60, 20);
      ctx.shadowBlur = 0;
    }
    // Red cross signs
    for (let sx = 400; sx < W; sx += 600) {
      ctx.fillStyle = '#e63946';
      ctx.fillRect(sx - 10, GY - 200, 20, 60);
      ctx.fillRect(sx - 30, GY - 180, 60, 20);
    }
    // Linoleum floor
    ctx.fillStyle = '#e0e8e0';
    ctx.fillRect(0, GY, W, H - GY + 200);
    ctx.strokeStyle = '#ccd6cc'; ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 60) { ctx.beginPath(); ctx.moveTo(i, GY); ctx.lineTo(i, H); ctx.stroke(); }
  }

  else if (theme === 'garage') {
    // Parking garage
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(0, 0, W, GY);
    // Concrete pillars
    ctx.fillStyle = '#4a4a4a';
    for (let px = 200; px < W; px += 300) {
      ctx.fillRect(px - 20, 0, 40, GY);
      ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
      ctx.strokeRect(px - 20, 0, 40, GY);
    }
    // Low ceiling
    ctx.fillStyle = '#383838';
    ctx.fillRect(0, 0, W, 40);
    // Pipe conduits
    ctx.strokeStyle = '#666'; ctx.lineWidth = 10;
    for (let pipe = 0; pipe < W; pipe += 400) {
      ctx.beginPath(); ctx.moveTo(pipe, 20); ctx.lineTo(pipe + 350, 20); ctx.stroke();
    }
    // Painted parking lines on floor
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3;
    for (let pl = 0; pl < W; pl += 120) {
      ctx.beginPath(); ctx.moveTo(pl, GY); ctx.lineTo(pl, GY + 60); ctx.stroke();
    }
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GY + 60); ctx.lineTo(W, GY + 60); ctx.stroke();
    // Oil stains on floor
    ctx.fillStyle = '#111';
    for (let os = 100; os < W; os += 300) {
      ctx.beginPath(); ctx.ellipse(os, GY + 30, 25, 10, 0, 0, Math.PI * 2); ctx.fill();
    }
    drawConcrete('#2e2e2e', '#383838');
  }

  else if (theme === 'garden') {
    // Garden district - daytime outdoors
    drawSky('#87ceeb', '#c8e8f8');
    drawSun(250, 70);
    // Clouds
    ctx.fillStyle = '#ffffffdd';
    [[300,55,80,35],[700,40,100,40],[1400,65,70,30]].forEach(([cx,cy,cw,ch]) => {
      ctx.beginPath(); ctx.ellipse(cx,cy,cw,ch,0,0,Math.PI*2); ctx.fill();
    });
    // Trees in background
    for (let tx = 50; tx < W; tx += 180) {
      const th = 100 + (tx % 60);
      ctx.fillStyle = '#2e8b57';
      ctx.beginPath(); ctx.arc(tx, GY - th, 35, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#228b22';
      ctx.beginPath(); ctx.arc(tx + 15, GY - th - 20, 25, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(tx - 8, GY - th + 30, 16, th - 30);
    }
    // Grass
    const grassGrad = ctx.createLinearGradient(0, GY, 0, GY + 80);
    grassGrad.addColorStop(0, '#5a9e3a');
    grassGrad.addColorStop(1, '#3d7a24');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, GY, W, H - GY + 200);
    // Grass tufts
    ctx.strokeStyle = '#4a8a30'; ctx.lineWidth = 2;
    for (let g = 0; g < W; g += 20) {
      ctx.beginPath(); ctx.moveTo(g, GY); ctx.lineTo(g + 5, GY - 10); ctx.stroke();
    }
    // Garden path
    ctx.fillStyle = '#c8a878';
    ctx.fillRect(0, GY + 5, W, 20);
    ctx.strokeStyle = '#b09868'; ctx.lineWidth = 1;
    for (let sp = 0; sp < W; sp += 50) {
      ctx.strokeRect(sp, GY + 5, 48, 18);
    }
  }

  else if (theme === 'sportsblock') {
    // Sports area / court
    drawSky('#6ab4d8', '#b0d8f0');
    drawSun(300, 60);
    // Court floor
    ctx.fillStyle = '#c85020';
    ctx.fillRect(0, GY, W, H - GY + 200);
    // Court lines
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
    for (let cl = 0; cl < W; cl += 200) {
      ctx.beginPath(); ctx.moveTo(cl, GY); ctx.lineTo(cl, GY + 80); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, GY + 40); ctx.lineTo(W, GY + 40); ctx.stroke();
    // Bleachers in background
    ctx.fillStyle = '#9aa5b4';
    for (let bl = 0; bl < W; bl += 100) {
      ctx.fillRect(bl, GY - 150, 96, 150);
      ctx.strokeStyle = '#7f8c9e'; ctx.lineWidth = 2;
      ctx.strokeRect(bl, GY - 150, 96, 150);
    }
    // Stadium lights
    for (let sl = 200; sl < W; sl += 600) {
      ctx.fillStyle = '#888';
      ctx.fillRect(sl - 10, GY - 280, 20, 130);
      ctx.fillStyle = '#fffde0';
      ctx.shadowColor = '#fffde0'; ctx.shadowBlur = 30;
      ctx.fillRect(sl - 40, GY - 290, 80, 20);
      ctx.shadowBlur = 0;
    }
  }

  else if (theme === 'transit') {
    // Train station / transit hub
    drawSky('#2a3a4a', '#3a4a5a');
    drawStars(50);
    drawMoon(W - 200, 60, 35);
    // Station hall
    ctx.fillStyle = '#3c3c3c';
    ctx.fillRect(0, 0, W, GY);
    // Arched ceiling
    for (let ax = 0; ax < W; ax += 300) {
      ctx.strokeStyle = '#666'; ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(ax + 150, GY, 200, Math.PI, 0);
      ctx.stroke();
    }
    // Large departure board
    ctx.fillStyle = '#000';
    ctx.fillRect(W / 2 - 200, 60, 400, 100);
    ctx.fillStyle = '#00ff66';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DEPARTURES', W / 2, 100);
    ctx.font = '14px monospace';
    ctx.fillText('TRAIN A ........ 22:40', W / 2, 130);
    ctx.fillText('TRAIN B ........ 22:58', W / 2, 148);
    ctx.textAlign = 'left';
    // Platform
    ctx.fillStyle = '#888';
    ctx.fillRect(0, GY, W, 40);
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(0, GY, W, 8);
    // Track
    ctx.fillStyle = '#444';
    ctx.fillRect(0, GY + 40, W, 25);
    ctx.fillStyle = '#777';
    ctx.fillRect(0, GY + 43, W, 5); ctx.fillRect(0, GY + 52, W, 5);
  }

  else if (theme === 'fireescape') {
    // Fire escape / rooftop side
    drawSky('#ff4400', '#cc2200');
    drawStars(20);
    // Brick building face
    for (let bx = 0; bx < W; bx += 30) {
      const brickColor = (Math.floor(bx / 30) % 2 === 0) ? '#7a3d2e' : '#6b3328';
      ctx.fillStyle = brickColor;
      for (let by = 0; by < GY; by += 18) {
        const offset = (Math.floor(by / 18) % 2) * 15;
        ctx.fillRect(bx + (offset % 30), by, 28, 16);
      }
    }
    // Fire escape metal railings
    ctx.strokeStyle = '#888'; ctx.lineWidth = 5;
    for (let fx = 0; fx < W; fx += 200) {
      ctx.beginPath(); ctx.moveTo(fx, GY); ctx.lineTo(fx, GY - 120); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fx, GY - 120); ctx.lineTo(fx + 180, GY - 120); ctx.stroke();
    }
    // Grates / floor metal
    ctx.fillStyle = '#555';
    ctx.fillRect(0, GY, W, 20);
    ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
    for (let g = 0; g < W; g += 20) {
      ctx.beginPath(); ctx.moveTo(g, GY); ctx.lineTo(g, GY + 20); ctx.stroke();
    }
  }

  else if (theme === 'tower') {
    // Skyscraper tower
    drawSky('#0a0a1a', '#1a1a2a');
    drawStars(80);
    drawMoon(200, 80, 40);
    // Glass curtain wall
    ctx.fillStyle = '#1a2a3a';
    ctx.fillRect(0, 0, W, GY);
    // Reflective glass panels
    for (let gx = 0; gx < W; gx += 60) {
      for (let gy = 0; gy < GY; gy += 80) {
        const isLit = ((gx + gy) % 3 !== 0);
        ctx.fillStyle = isLit ? '#1e3040' : '#0a1a28';
        ctx.fillRect(gx + 2, gy + 2, 54, 74);
        if (isLit) {
          ctx.fillStyle = 'rgba(100,180,255,0.1)';
          ctx.fillRect(gx + 2, gy + 2, 20, 20);
        }
      }
    }
    // Red warning lights
    for (let rl = 100; rl < W; rl += 300) {
      ctx.fillStyle = '#ff0000';
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 15;
      ctx.beginPath(); ctx.arc(rl, 30, 8, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    drawConcrete('#1e1e1e', '#2a2a2a');
  }

  else if (theme === 'harbor') {
    // Harbor with ships
    drawSky('#1a2a3a', '#2a3a4a');
    drawStars(60);
    drawMoon(300, 70, 45);
    drawWater();
    // Pier
    ctx.fillStyle = '#5c4a30';
    ctx.fillRect(0, GY, W, 40);
    ctx.strokeStyle = '#3d3020'; ctx.lineWidth = 2;
    for (let dp = 0; dp < W; dp += 25) {
      ctx.beginPath(); ctx.moveTo(dp, GY); ctx.lineTo(dp, GY + 40); ctx.stroke();
    }
    // Ship hulls (background)
    for (let ship = 100; ship < W; ship += 700) {
      ctx.fillStyle = '#2a3545';
      ctx.beginPath();
      ctx.moveTo(ship, GY - 80);
      ctx.lineTo(ship + 400, GY - 80);
      ctx.lineTo(ship + 430, GY);
      ctx.lineTo(ship - 30, GY);
      ctx.closePath();
      ctx.fill();
      // Superstructure
      ctx.fillStyle = '#3a4555';
      ctx.fillRect(ship + 100, GY - 160, 150, 80);
      // Masts
      ctx.strokeStyle = '#778899'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(ship + 175, GY - 160); ctx.lineTo(ship + 175, GY - 260); ctx.stroke();
      // Port lights
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(ship, GY - 90, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#00ff00';
      ctx.beginPath(); ctx.arc(ship + 430, GY - 90, 6, 0, Math.PI * 2); ctx.fill();
    }
  }

  else if (theme === 'tunnel') {
    // Dark tunnel
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, W, H);
    // Curved tunnel walls
    ctx.fillStyle = '#1a1a22';
    ctx.fillRect(0, 0, W, GY);
    // Tunnel arch pattern
    ctx.strokeStyle = '#2a2a32'; ctx.lineWidth = 8;
    for (let arch = 0; arch < W; arch += 200) {
      ctx.beginPath();
      ctx.arc(arch + 100, GY, 180, Math.PI, 0);
      ctx.stroke();
    }
    // Concrete texture
    ctx.strokeStyle = '#222228'; ctx.lineWidth = 2;
    for (let tx = 0; tx < W; tx += 40) {
      ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(tx, GY); ctx.stroke();
    }
    // Tunnel lights
    for (let tl = 100; tl < W; tl += 200) {
      ctx.fillStyle = '#ffffcc';
      ctx.shadowColor = '#ffff88'; ctx.shadowBlur = 40;
      ctx.fillRect(tl - 15, GY - 25, 30, 10);
      ctx.shadowBlur = 0;
      // Light cone
      ctx.fillStyle = 'rgba(255,255,150,0.05)';
      ctx.beginPath();
      ctx.moveTo(tl - 15, GY - 15);
      ctx.lineTo(tl + 15, GY - 15);
      ctx.lineTo(tl + 60, GY);
      ctx.lineTo(tl - 60, GY);
      ctx.closePath();
      ctx.fill();
    }
    drawConcrete('#141418', '#1e1e24');
    // Rail tracks
    ctx.fillStyle = '#444';
    ctx.fillRect(0, GY + 20, W, 20);
    ctx.fillStyle = '#666';
    ctx.fillRect(0, GY + 23, W, 4); ctx.fillRect(0, GY + 32, W, 4);
  }

  else if (theme === 'nightrun') {
    // Night city streets
    drawSky('#050510', '#0a0a1a');
    drawStars(100);
    drawMoon(W * 0.7, 60, 40);
    drawCityBuildings(['#1a1a2a','#14141e','#1e1e2e','#22222e'], 'rgba(255,255,100,0.6)', 25, GY - 60);
    // Neon signs on buildings
    ['#ff0066','#00ffcc','#ff9900','#0099ff'].forEach((nc, ni) => {
      ctx.fillStyle = nc + '99';
      ctx.shadowColor = nc; ctx.shadowBlur = 20;
      ctx.fillRect(ni * 400 + 150, GY - 200 + ni * 20, 80, 30);
      ctx.shadowBlur = 0;
    });
    drawSidewalk();
    drawRoad('#1e1e1e', '#ffee22');
    // Wet road reflections
    ctx.fillStyle = 'rgba(100,150,255,0.1)';
    ctx.fillRect(0, GY, W, 20);
    // Streetlights with glow
    for (let sl = 300; sl < W; sl += 400) {
      ctx.fillStyle = '#555'; ctx.fillRect(sl - 5, GY - 220, 10, 220);
      ctx.fillStyle = '#ffee88';
      ctx.shadowColor = '#ffee88'; ctx.shadowBlur = 40;
      ctx.beginPath(); ctx.arc(sl, GY - 230, 18, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  else if (theme === 'citynight') {
    // City at night - final showdown
    drawSky('#020208', '#08080f');
    drawStars(120);
    drawMoon(600, 50, 55);
    drawCityBuildings(['#1a1a28','#14141e','#222235','#1c1c2c'], 'rgba(255,255,80,0.7)', 30, GY - 80);
    // Dramatic red clouds
    ctx.fillStyle = 'rgba(180,0,0,0.15)';
    for (let rc = 0; rc < W; rc += 400) {
      ctx.beginPath(); ctx.ellipse(rc + 200, 100, 200, 60, 0, 0, Math.PI * 2); ctx.fill();
    }
    // Explosions/fires in background
    for (let ef = 200; ef < W; ef += 700) {
      const fireGrad = ctx.createRadialGradient(ef, GY - 120, 0, ef, GY - 120, 80);
      fireGrad.addColorStop(0, 'rgba(255,200,0,0.3)');
      fireGrad.addColorStop(0.5, 'rgba(255,80,0,0.15)');
      fireGrad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = fireGrad;
      ctx.beginPath(); ctx.arc(ef, GY - 120, 80, 0, Math.PI * 2); ctx.fill();
    }
    drawSidewalk();
    drawRoad('#141414', '#ff4400');
    // Wet puddles reflecting red
    ctx.fillStyle = 'rgba(200,50,0,0.12)';
    for (let pd = 100; pd < W; pd += 300) {
      ctx.beginPath(); ctx.ellipse(pd, GY + 12, 50, 10, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  else if (theme === 'boss') {
    // Final boss arena
    ctx.fillStyle = '#0a0000';
    ctx.fillRect(0, 0, W, H);
    // Dark red gradient sky
    const bossGrad = ctx.createLinearGradient(0, 0, 0, GY);
    bossGrad.addColorStop(0, '#1a0000');
    bossGrad.addColorStop(0.5, '#3a0000');
    bossGrad.addColorStop(1, '#5a0000');
    ctx.fillStyle = bossGrad;
    ctx.fillRect(0, 0, W, GY);
    // Ominous cracked walls
    ctx.strokeStyle = '#550000'; ctx.lineWidth = 3;
    for (let cx = 0; cx < W; cx += 100) {
      for (let cy = 0; cy < GY; cy += 80) {
        ctx.strokeRect(cx, cy, 98, 78);
      }
    }
    // Cracks
    ctx.strokeStyle = '#880000'; ctx.lineWidth = 1;
    for (let cr = 0; cr < W; cr += 300) {
      ctx.beginPath(); ctx.moveTo(cr, 0);
      ctx.lineTo(cr + 40, 100); ctx.lineTo(cr + 20, 200); ctx.lineTo(cr + 60, 350);
      ctx.stroke();
    }
    // Fire pits
    for (let fp = 100; fp < W; fp += 400) {
      const fpGrad = ctx.createRadialGradient(fp, GY, 0, fp, GY, 100);
      fpGrad.addColorStop(0, 'rgba(255,180,0,0.5)');
      fpGrad.addColorStop(0.4, 'rgba(255,60,0,0.3)');
      fpGrad.addColorStop(1, 'rgba(200,0,0,0)');
      ctx.fillStyle = fpGrad;
      ctx.beginPath(); ctx.arc(fp, GY, 100, 0, Math.PI * 2); ctx.fill();
    }
    // Glowing lava cracks in floor
    ctx.fillStyle = '#222222';
    ctx.fillRect(0, GY, W, H - GY + 200);
    ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2;
    for (let lc = 0; lc < W; lc += 150) {
      ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.moveTo(lc, GY); ctx.lineTo(lc + 70, GY + 20); ctx.lineTo(lc + 140, GY + 5); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    return; // skip the generic ground draw below
  }

  else {
    // Fallback: generic city
    drawSky('#87ceeb', '#c8e8f8');
    drawCityBuildings(['#b0b8c4','#9aa5b4','#c2c9d4'], 'rgba(255,255,180,0.5)');
    drawSidewalk();
    drawRoad('#4a4a4a', '#ffe066');
  }
}

function drawDecorations(ctx) {
  game.decorations.forEach(dec => {
    if (dec.type === 'background') return;
    
    if (dec.type === 'sign') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 60, dec.y, 120, 80);
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 3;
      ctx.strokeRect(dec.x - 60, dec.y, 120, 80);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(dec.text, dec.x, dec.y + 45);
    } else if (dec.type === 'trash') {
      ctx.fillStyle = '#2f4f2f';
      ctx.fillRect(dec.x - 20, dec.y, 40, 60);
      ctx.strokeStyle = '#1f3f1f';
      ctx.lineWidth = 2;
      ctx.strokeRect(dec.x - 20, dec.y, 40, 60);
    } else if (dec.type === 'car') {
      ctx.fillStyle = '#4a4a5e';
      ctx.fillRect(dec.x - 50, dec.y, 100, 50);
      ctx.fillStyle = '#2a2a3e';
      ctx.fillRect(dec.x - 40, dec.y - 20, 80, 20);
      // Wheels
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(dec.x - 30, dec.y + 50, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(dec.x + 30, dec.y + 50, 10, 0, Math.PI * 2);
      ctx.fill();
    } else if (dec.type === 'crate') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 30, dec.y, 60, 80);
      // Wood texture
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 3;
      for (let i = 0; i < 80; i += 20) {
        ctx.beginPath();
        ctx.moveTo(dec.x - 30, dec.y + i);
        ctx.lineTo(dec.x + 30, dec.y + i);
        ctx.stroke();
      }
    } else if (dec.type === 'barrel') {
      ctx.fillStyle = '#8b4513';
      ctx.beginPath();
      ctx.arc(dec.x, dec.y + 40, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 3;
      ctx.stroke();
      // Bands
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = '#4a4a5e';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(dec.x, dec.y + 20 + i * 20, 30, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else if (dec.type === 'ac') {
      ctx.fillStyle = '#696969';
      ctx.fillRect(dec.x - 35, dec.y, 70, 70);
      // Vents
      ctx.strokeStyle = '#505050';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(dec.x - 30, dec.y + 15 + i * 10);
        ctx.lineTo(dec.x + 30, dec.y + 15 + i * 10);
        ctx.stroke();
      }
    } else if (dec.type === 'watertower') {
      ctx.fillStyle = '#8b4513';
      // Legs
      ctx.fillRect(dec.x - 40, dec.y + 80, 15, 120);
      ctx.fillRect(dec.x + 25, dec.y + 80, 15, 120);
      // Tank
      ctx.fillStyle = '#a0522d';
      ctx.beginPath();
      ctx.arc(dec.x, dec.y + 50, 50, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#8b4513';
      ctx.lineWidth = 3;
      ctx.stroke();
    } else if (dec.type === 'machine') {
      ctx.fillStyle = '#2f4f4f';
      ctx.fillRect(dec.x - 40, dec.y, 80, 100);
      // Control panel
      ctx.fillStyle = '#1f3f3f';
      ctx.fillRect(dec.x - 30, dec.y + 10, 60, 40);
      // Lights
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(dec.x - 15, dec.y + 25, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#00ff00';
      ctx.beginPath();
      ctx.arc(dec.x + 15, dec.y + 25, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (dec.type === 'chalkboard') {
      ctx.fillStyle = '#2f4f2f';
      ctx.fillRect(dec.x - 80, dec.y, 160, 100);
      ctx.strokeStyle = '#6b8e23';
      ctx.lineWidth = 4;
      ctx.strokeRect(dec.x - 80, dec.y, 160, 100);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('A + B = C', dec.x - 40, dec.y + 35);
      ctx.fillText('SCIENCE', dec.x - 40, dec.y + 65);
    } else if (dec.type === 'desk') {
      ctx.fillStyle = '#a0522d';
      ctx.fillRect(dec.x - 40, dec.y, 80, 40);
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 45, dec.y + 40, 90, 10);
    } else if (dec.type === 'locker') {
      ctx.fillStyle = '#7f8c8d';
      ctx.fillRect(dec.x - 25, dec.y, 50, 100);
      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 2;
      ctx.strokeRect(dec.x - 25, dec.y, 50, 100);
      ctx.fillStyle = '#ecf0f1';
      ctx.fillRect(dec.x - 20, dec.y + 10, 40, 20);
      ctx.fillRect(dec.x - 20, dec.y + 50, 40, 20);
    } else if (dec.type === 'bulletin') {
      ctx.fillStyle = '#f5deb3';
      ctx.fillRect(dec.x - 50, dec.y - 20, 100, 80);
      ctx.strokeStyle = '#a0522d';
      ctx.lineWidth = 3;
      ctx.strokeRect(dec.x - 50, dec.y - 20, 100, 80);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 12px Arial';
      ctx.fillText('EVENTS', dec.x, dec.y + 5);
    } else if (dec.type === 'bookshelf') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 40, dec.y, 80, 120);
      ctx.fillStyle = '#d2691e';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(dec.x - 35, dec.y + 10 + i * 25, 70, 15);
      }
    } else if (dec.type === 'book') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 20, dec.y, 40, 25);
      ctx.fillStyle = '#fff';
      ctx.fillRect(dec.x - 18, dec.y + 3, 36, 19);
    } else if (dec.type === 'table') {
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(dec.x - 60, dec.y, 120, 30);
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 60, dec.y + 30, 10, 30);
      ctx.fillRect(dec.x + 50, dec.y + 30, 10, 30);
    } else if (dec.type === 'tray') {
      ctx.fillStyle = '#cd853f';
      ctx.fillRect(dec.x - 30, dec.y + 10, 60, 20);
      ctx.fillStyle = '#fff';
      ctx.fillRect(dec.x - 20, dec.y + 15, 40, 10);
    } else if (dec.type === 'basketballHoop') {
      ctx.fillStyle = '#ff4500';
      ctx.fillRect(dec.x - 40, dec.y, 80, 10);
      ctx.beginPath();
      ctx.arc(dec.x, dec.y + 20, 20, 0, Math.PI, false);
      ctx.strokeStyle = '#ff4500';
      ctx.lineWidth = 5;
      ctx.stroke();
    } else if (dec.type === 'bench') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 50, dec.y, 100, 20);
      ctx.fillRect(dec.x - 40, dec.y + 20, 15, 25);
      ctx.fillRect(dec.x + 25, dec.y + 20, 15, 25);
    } else if (dec.type === 'labTable') {
      ctx.fillStyle = '#bdc3c7';
      ctx.fillRect(dec.x - 50, dec.y, 100, 30);
      ctx.fillStyle = '#95a5a6';
      ctx.fillRect(dec.x - 45, dec.y + 30, 15, 30);
      ctx.fillRect(dec.x + 30, dec.y + 30, 15, 30);
    } else if (dec.type === 'beaker') {
      ctx.fillStyle = '#3498db';
      ctx.beginPath();
      ctx.moveTo(dec.x - 15, dec.y + 30);
      ctx.lineTo(dec.x + 15, dec.y + 30);
      ctx.lineTo(dec.x + 10, dec.y);
      ctx.lineTo(dec.x - 10, dec.y);
      ctx.closePath();
      ctx.fill();
    } else if (dec.type === 'easel') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 5, dec.y, 10, 80);
      ctx.beginPath();
      ctx.moveTo(dec.x - 40, dec.y + 20);
      ctx.lineTo(dec.x + 40, dec.y + 20);
      ctx.lineTo(dec.x + 20, dec.y + 60);
      ctx.lineTo(dec.x - 20, dec.y + 60);
      ctx.closePath();
      ctx.fillStyle = '#fff';
      ctx.fill();
    } else if (dec.type === 'paint') {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(dec.x - 10, dec.y, 20, 20);
      ctx.fillStyle = '#000';
      ctx.fillRect(dec.x - 8, dec.y + 5, 16, 2);
    } else if (dec.type === 'computer') {
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(dec.x - 30, dec.y, 60, 40);
      ctx.fillStyle = '#ecf0f1';
      ctx.fillRect(dec.x - 25, dec.y + 5, 50, 25);
    } else if (dec.type === 'speaker') {
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(dec.x - 20, dec.y, 40, 60);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(dec.x, dec.y + 20, 10, 0, Math.PI * 2);
      ctx.fill();
    } else if (dec.type === 'piano') {
      ctx.fillStyle = '#000';
      ctx.fillRect(dec.x - 50, dec.y, 100, 40);
      ctx.fillStyle = '#fff';
      ctx.fillRect(dec.x - 45, dec.y + 5, 90, 20);
    } else if (dec.type === 'stage') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 80, dec.y, 160, 30);
      ctx.fillStyle = '#000';
      ctx.fillRect(dec.x - 70, dec.y - 20, 140, 20);
    } else if (dec.type === 'chair') {
      ctx.fillStyle = '#a0522d';
      ctx.fillRect(dec.x - 20, dec.y, 40, 20);
      ctx.fillRect(dec.x - 10, dec.y + 20, 20, 30);
    } else if (dec.type === 'tree') {
      ctx.fillStyle = '#2e8b57';
      ctx.beginPath();
      ctx.arc(dec.x, dec.y - 20, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(dec.x - 10, dec.y, 20, 50);
    } else if (dec.type === 'bus') {
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(dec.x - 50, dec.y, 100, 50);
      ctx.fillStyle = '#000';
      ctx.fillRect(dec.x - 40, dec.y + 10, 30, 20);
      ctx.fillRect(dec.x + 10, dec.y + 10, 30, 20);
    } else if (dec.type === 'parkingSign') {
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(dec.x - 10, dec.y, 20, 60);
      ctx.fillStyle = '#fff';
      ctx.fillRect(dec.x - 18, dec.y + 10, 36, 20);
      ctx.fillStyle = '#2c3e50';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('P', dec.x, dec.y + 25);
    } else if (dec.type === 'camera') {
      ctx.fillStyle = '#34495e';
      ctx.fillRect(dec.x - 15, dec.y, 30, 20);
      ctx.fillStyle = '#000';
      ctx.fillRect(dec.x - 5, dec.y + 5, 10, 10);
    } else if (dec.type === 'poster') {
      ctx.fillStyle = '#ff6f61';
      ctx.fillRect(dec.x - 25, dec.y - 40, 50, 60);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Arial';
      ctx.fillText('SHOW', dec.x, dec.y - 15);
    } else if (dec.type === 'pipe') {
      ctx.fillStyle = '#4682b4';
      ctx.fillRect(dec.x - 15, dec.y, 30, 400);
      // Pipe segments
      ctx.strokeStyle = '#36648b';
      ctx.lineWidth = 3;
      for (let i = 0; i < 400; i += 50) {
        ctx.beginPath();
        ctx.moveTo(dec.x - 15, dec.y + i);
        ctx.lineTo(dec.x + 15, dec.y + i);
        ctx.stroke();
      }
    } else if (dec.type === 'container') {
      ctx.fillStyle = '#ff6347';
      ctx.fillRect(dec.x - 60, dec.y, 120, 100);
      ctx.strokeStyle = '#cd5c5c';
      ctx.lineWidth = 4;
      ctx.strokeRect(dec.x - 60, dec.y, 120, 100);
      // Door
      ctx.strokeStyle = '#8b0000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(dec.x, dec.y);
      ctx.lineTo(dec.x, dec.y + 100);
      ctx.stroke();
    } else if (dec.type === 'tank') {
      ctx.fillStyle = '#2f4f2f';
      ctx.fillRect(dec.x - 60, dec.y + 40, 120, 40);
      // Turret
      ctx.fillRect(dec.x - 30, dec.y + 20, 60, 20);
      // Barrel
      ctx.fillRect(dec.x + 30, dec.y + 25, 40, 10);
      // Tracks
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(dec.x - 60, dec.y + 75, 120, 10);
    } else if (dec.type === 'barrier') {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(dec.x - 50, dec.y, 100, 80);
      ctx.fillStyle = '#fff';
      ctx.fillRect(dec.x - 40, dec.y + 10, 80, 20);
      ctx.fillRect(dec.x - 40, dec.y + 50, 80, 20);
    }
  });
}

function drawCharacter(ctx, char, isPlayer) {
  const x = char.x;
  const y = char.y - char.height;
  
  ctx.save();
  
  if (!char.facingRight) {
    ctx.translate(x, 0);
    ctx.scale(-1, 1);
    ctx.translate(-x, 0);
  }
  
  // Body
  ctx.fillStyle = isPlayer ? '#0000ff' : char.color;
  ctx.fillRect(x - char.width/2 + 10, y + 30, char.width - 20, char.height - 50);
  
  // Head
  ctx.fillStyle = '#ffdbac';
  ctx.beginPath();
  ctx.arc(x, y + 20, char.width/3, 0, Math.PI * 2);
  ctx.fill();
  
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 8, y + 15, 5, 5);
  ctx.fillRect(x + 3, y + 15, 5, 5);
  
  // Arms
  ctx.fillStyle = '#ffdbac';
  
  if (char.state === 'shoot' && ((isPlayer && game.player.currentWeapon) || (!isPlayer && char.hasGun))) {
    // Shooting pose
    ctx.fillRect(x + char.width/2 - 10, y + 40, 15, 40);
    ctx.fillRect(x - char.width/2 - 5, y + 40, 15, 40);
    
    // Gun
    ctx.fillStyle = '#000';
    ctx.fillRect(x + char.width/2 + 5, y + 45, 30, 10);
    ctx.fillStyle = '#666';
    ctx.fillRect(x + char.width/2, y + 48, 10, 4);
    
    // Muzzle flash
    if (char.animFrame === 0) {
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(x + char.width/2 + 35, y + 50, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (char.state === 'attack') {
    // Punching pose
    ctx.fillRect(x + char.width/2, y + 40, 30, 15);
    ctx.fillRect(x - char.width/2 - 5, y + 40, 15, 40);
  } else if (char.state === 'kick') {
    // Kicking pose
    ctx.fillRect(x + char.width/2 - 10, y + 40, 15, 40);
    ctx.fillRect(x - char.width/2 - 5, y + 40, 15, 40);
    // Leg extended
    ctx.fillStyle = isPlayer ? '#0000ff' : char.color;
    ctx.fillRect(x + char.width/2, y + 60, 40, 15);
  } else {
    // Normal arms
    ctx.fillRect(x + char.width/2 - 10, y + 40, 15, 40);
    ctx.fillRect(x - char.width/2 - 5, y + 40, 15, 40);
  }
  
  // Legs
  ctx.fillStyle = isPlayer ? '#0000ff' : char.color;
  if (char.state === 'walk' || char.state === 'run') {
    const legOffset = Math.sin(char.animFrame * 0.5) * 10;
    ctx.fillRect(x - char.width/4, y + char.height - 20 + legOffset, 12, 20);
    ctx.fillRect(x + char.width/4 - 12, y + char.height - 20 - legOffset, 12, 20);
  } else {
    ctx.fillRect(x - char.width/4, y + char.height - 20, 12, 20);
    ctx.fillRect(x + char.width/4 - 12, y + char.height - 20, 12, 20);
  }
  
  // Armor indicator
  if (!isPlayer && char.armor > 0) {
    ctx.strokeStyle = '#4a4a5e';
    ctx.lineWidth = 3;
    ctx.strokeRect(x - char.width/2 + 10, y + 30, char.width - 20, char.height - 50);
  }
  
  // Stunned effect
  if (char.stunned) {
    ctx.fillStyle = '#ffff00';
    ctx.font = '20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⭐', x - 20, y);
    ctx.fillText('⭐', x + 20, y);
  }
  
  // Blinded effect
  if (!isPlayer && char.blinded) {
    ctx.fillStyle = '#808080';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(x - char.width/2, y, char.width, char.height);
    ctx.globalAlpha = 1;
  }
  
  ctx.restore();
}

function drawHUD(ctx) {
  // Health
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(20, 20, 400, 60);
  ctx.font = '30px Arial';
  ctx.textAlign = 'left';
  for (let i = 0; i < game.player.maxHealth; i++) {
    ctx.fillText(i < game.player.health ? '❤️' : '🖤', 30 + i * 40, 55);
  }
  
  // Score
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(CONFIG.CANVAS_WIDTH - 320, 20, 300, 60);
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${game.player.score}`, CONFIG.CANVAS_WIDTH - 30, 55);
  ctx.textAlign = 'left';
  
  // Secret mini-level timer
  if (game.inSecret) {
    ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
    ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 150, 20, 300, 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    const secondsLeft = Math.ceil(game.secretTimer / 60);
    ctx.fillText(`TIME: ${secondsLeft}s`, CONFIG.CANVAS_WIDTH / 2, 55);
    
    const coinsLeft = game.secretCoins.filter(c => !c.collected).length;
    ctx.font = 'bold 24px Arial';
    ctx.fillText(`COINS: ${coinsLeft}`, CONFIG.CANVAS_WIDTH / 2, 100);
    ctx.textAlign = 'left';
  }
  
  // Jump charge indicator
  if (game.player.jumpChargeTime > 0) {
    const chargePercent = game.player.jumpChargeTime / game.player.maxJumpCharge;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 100, CONFIG.CANVAS_HEIGHT - 100, 200, 30);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 95, CONFIG.CANVAS_HEIGHT - 95, 190 * chargePercent, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SUPER JUMP CHARGING!', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - 110);
    ctx.textAlign = 'left';
  }
  
  // Weapon Slots Inventory
  if (!game.inSecret) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(20, 100, 320, 200);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('WEAPON SLOTS (Q to switch):', 30, 125);
    
    // Draw 4 weapon slots
    for (let i = 0; i < 4; i++) {
      const slotX = 30 + (i % 2) * 150;
      const slotY = 145 + Math.floor(i / 2) * 70;
      
      // Slot background
      const isSelected = game.player.currentSlot === i;
      ctx.fillStyle = isSelected ? 'rgba(255, 255, 0, 0.3)' : 'rgba(100, 100, 100, 0.3)';
      ctx.fillRect(slotX, slotY, 140, 60);
      
      // Slot border
      ctx.strokeStyle = isSelected ? '#ffff00' : '#666';
      ctx.lineWidth = isSelected ? 3 : 2;
      ctx.strokeRect(slotX, slotY, 140, 60);
      
      // Slot number
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.fillText(`SHIFT+${i+1}`, slotX + 5, slotY + 15);
      
      // Weapon info
      const weapon = game.player.weaponSlots[i];
      if (weapon) {
        const weaponData = WEAPONS[weapon.type];
        ctx.fillStyle = weaponData.color;
        ctx.font = 'bold 18px Arial';
        ctx.fillText(`${weaponData.icon} ${weapon.type}`, slotX + 10, slotY + 38);
        
        // Ammo bar
        const ammoPercent = weapon.ammo / weaponData.maxAmmo;
        ctx.fillStyle = '#333';
        ctx.fillRect(slotX + 10, slotY + 45, 120, 8);
        ctx.fillStyle = ammoPercent > 0.3 ? '#00ff00' : '#ff0000';
        ctx.fillRect(slotX + 10, slotY + 45, 120 * ammoPercent, 8);
        
        // Ammo text
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.fillText(`${weapon.ammo}/${weaponData.maxAmmo}`, slotX + 50, slotY + 52);
      } else {
        ctx.fillStyle = '#666';
        ctx.font = '16px Arial';
        ctx.fillText('EMPTY', slotX + 40, slotY + 38);
      }
    }
  }
  
  // Grenades
  if (!game.inSecret) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(20, 320, 280, 120);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('GRENADES (1-4):', 30, 345);
    
    const grenadeTypes = ['FRAG', 'FIRE', 'SMOKE', 'FLASH'];
    grenadeTypes.forEach((type, i) => {
      const selected = game.player.currentGrenade === type;
      ctx.fillStyle = selected ? '#ffff00' : '#fff';
      ctx.fillText(`${i+1}. ${GRENADES[type].icon} ${type}: ${game.player.grenades[type]}`, 30, 375 + i * 20);
    });
  }
  
  // Level info
  if (!game.inSecret) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 200, 20, 400, 50);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${game.currentLevel}: ${LEVEL_NAMES[game.currentLevel]}`, CONFIG.CANVAS_WIDTH / 2, 50);
    ctx.textAlign = 'left';
    
    // Secret key indicator
    if (game.hasSecretKey) {
      ctx.fillStyle = 'rgba(255, 215, 0, 0.9)';
      ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 200, 75, 400, 35);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🔑 SECRET KEY OBTAINED! Find the secret area!', CONFIG.CANVAS_WIDTH / 2, 97);
      ctx.textAlign = 'left';
    }
    
    // Enemies remaining
    const enemiesAlive = game.enemies.filter(e => !e.dead).length;
    if (enemiesAlive > 0) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(CONFIG.CANVAS_WIDTH - 250, 100, 230, 50);
      ctx.fillStyle = '#ff0000';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'right';
      ctx.fillText(`ENEMIES: ${enemiesAlive}`, CONFIG.CANVAS_WIDTH - 30, 130);
      ctx.textAlign = 'left';
    }
  }
  
  // Controls hint
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(20, CONFIG.CANVAS_HEIGHT - 80, 700, 60);
  ctx.fillStyle = '#fff';
  ctx.font = '14px Arial';
  if (game.inSecret) {
    ctx.fillText('SECRET MINI-LEVEL! Collect all coins before time runs out!', 30, CONFIG.CANVAS_HEIGHT - 45);
  } else {
    ctx.fillText('← → Move | Z Jump (HOLD=SUPER) | X Punch | A Kick | S Shoot | G Grenade | E Secret', 30, CONFIG.CANVAS_HEIGHT - 50);
    ctx.fillText('Q Switch Weapon | SHIFT+1-4 Select Slot | 1-4 Select Grenade', 30, CONFIG.CANVAS_HEIGHT - 30);
  }
}

function togglePause() {
  // Toggle pause state
  game.paused = !game.paused;
  if (game.paused) {
    // Pause audio by suspending context if available
    try { game.audioContext && game.audioContext.suspend(); } catch (e) {}
  } else {
    try { game.audioContext && game.audioContext.resume(); } catch (e) {}
  }
}

function renderPauseOverlay(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 72px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 - 40);
  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('Press ESC to resume', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 20);
}

function renderGameOverOverlay(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 64px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 - 40);
  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('Press ENTER to return to map', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 20);
}

function drawBossUI(ctx) {
  const boss = game.enemies.find(e => e.type === 'BOSS' && !e.dead);
  if (!boss) return;

  // Large health bar at top center
  const barW = Math.min(CONFIG.CANVAS_WIDTH - 200, 1000);
  const barH = 36;
  const x = (CONFIG.CANVAS_WIDTH - barW) / 2;
  const y = 20;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x - 6, y - 6, barW + 12, barH + 42);

  // Name and phase
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`FINAL BOSS - Phase ${boss.phase}`, x + 10, y + 22);

  // Health bar
  const healthPct = Math.max(0, boss.health / boss.maxHealth);
  ctx.fillStyle = '#444';
  ctx.fillRect(x + 10, y + 30, barW - 20, barH);
  ctx.fillStyle = boss.phase >= 3 ? '#ffcc00' : '#ff4444';
  ctx.fillRect(x + 10, y + 30, (barW - 20) * healthPct, barH);

  // Phase aura indicator
  if (boss.enraged || boss.aura > 0) {
    ctx.fillStyle = 'rgba(255,255,0,0.12)';
    ctx.fillRect(x - 50, y - 20, barW + 100, barH + 80);
  }

  // If boss has aura around its sprite, draw a screen-space glow
  if (boss.aura && boss.aura > 0) {
    ctx.fillStyle = `rgba(255, 215, 0, ${Math.min(0.6, boss.aura)})`;
    ctx.beginPath();
    ctx.arc((boss.x - game.camera.x), boss.y - boss.height / 2, 120 * boss.aura, 0, Math.PI * 2);
    ctx.fill();
  }

  if (boss.phase === 4) {
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('FINAL RAGE - FISTS ONLY!', CONFIG.CANVAS_WIDTH / 2, y + barH + 70);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.fillText('Use PUNCH / KICK to deal heavy damage', CONFIG.CANVAS_WIDTH / 2, y + barH + 100);
    ctx.textAlign = 'left';
  }
}

function renderBossIntroOverlay(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 72px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('FINAL BOSS APPROACHES', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 - 40);
  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('THE ANGRY WARDEN EMERGES...', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 10);
  ctx.fillText('Yellow aura means he is enraged.', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 50);
  ctx.fillText('Wait for the music, then fight with your fists!', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 90);
}
window.addEventListener('load', () => {
  init();
});

</script>
